services:
  postgres:
    image: postgres:16
    container_name: coin-postgres
    restart: always
    environment:
      POSTGRES_DB: coin_catalog
      POSTGRES_USER: coin_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coin_admin -d coin_catalog"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coin-net

  api:
    build: ./api
    container_name: coin-api
    restart: always
    environment:
      DATABASE_URL: postgresql://coin_admin:${POSTGRES_PASSWORD}@postgres:5432/coin_catalog
      JWT_SECRET: ${JWT_SECRET}
      IMAGE_DIR: /app/images
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - coin-images:/app/images
    networks:
      - coin-net

  frontend:
    build:
      context: ../dashboard
      dockerfile: Dockerfile.prod
    container_name: coin-frontend
    restart: always
    networks:
      - coin-net

  nginx:
    image: nginx:alpine
    container_name: coin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    networks:
      - coin-net

volumes:
  pgdata:
  coin-images:

networks:
  coin-net:
    driver: bridge
