server {
    listen 80;
    server_name turnip56.com www.turnip56.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name turnip56.com www.turnip56.com;

    ssl_certificate /etc/letsencrypt/live/turnip56.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turnip56.com/privkey.pem;

    client_max_body_size 25M;

    # API
    location /api/ {
        proxy_pass http://coin-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend
    location / {
        proxy_pass http://coin-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
